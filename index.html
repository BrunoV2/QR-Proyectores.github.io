<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Proyectores</title>
<style>
  body { 
    font-family: 'Inter', sans-serif; 
    padding: 15px; 
    background-color: #fcfcfc; 
    color: #333; 
    margin: 0;
  }
  h1 { text-align: center; font-weight: 900; color: #444; margin-bottom: 30px; }

  .grupo-marca { margin-bottom: 40px; }
  .grupo-marca h2 { 
    font-size: 2em; font-weight: 900; color: #2d3436; 
    padding-left: 10px; border-left: 6px solid #fab1a0; 
  }
  .grupo-marca hr { display: none; }

  .grupo-modelo h3 { 
    font-size: 1.1em; color: #636e72; text-transform: uppercase; 
    margin: 20px 0 10px 10px; letter-spacing: 1px;
  }

  .cards-fila { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }

  .card {
    background: #fff;
    border-radius: 20px;
    padding: 15px;
    border: 1px solid rgba(0,0,0,0.03);
    box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -2px rgba(0,0,0,0.02);
    transition: transform 0.2s;
  }
  .card:active { transform: scale(0.96); }
  
  /* Colores pastel por posición o puedes mapearlos por marca */
  .card:nth-child(odd) { background-color: #f0f7ff; } /* Azul pastel */
  .card:nth-child(even) { background-color: #fff9f0; } /* Naranja pastel */

  .card strong { font-size: 1.2em; color: #2d3436; margin-bottom: 5px; }
  .card p { font-size: 0.85em; color: #555; margin: 4px 0; }
  .card .incidencia { 
    color: #d63031; font-size: 0.8em; font-weight: bold;
    background: rgba(255,255,255,0.6); padding: 5px; border-radius: 8px;
  }
  .card a {
    display: block; text-align: center; margin-top: 10px;
    padding: 8px; background: #2d3436; color: #fff;
    border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 0.8em;
  }
</style>
</head>
<body>
<h1>Lista de Proyectores</h1>
<div id="lista"></div>

<script>
fetch("proyectores.json")
  .then(res => res.json())
  .then(data => {
    const contenedor = document.getElementById("lista");

    const porMarca = {};
    data.forEach(p => {
      const marca = (p.marca || "Sin marca").replace(/^Benq$/i, "BenQ");
      const modelo = p.modelo || "Sin modelo";
      if (!porMarca[marca]) porMarca[marca] = {};
      if (!porMarca[marca][modelo]) porMarca[marca][modelo] = [];
      porMarca[marca][modelo].push(p);
    });

    let html = "";

    for (const marca in porMarca) {
      html += `<div class="grupo-marca">`;
      html += `<h2>${marca}</h2><hr>`;

      for (const modelo in porMarca[marca]) {
        html += `<div class="grupo-modelo">`;
        html += `<h3>${modelo}</h3>`;
        html += `<div class="cards-fila">`;

        porMarca[marca][modelo].forEach(p => {
          const url = `proyector.html?proyector=${p.id}`;

          const horas   = p.horas       ? `<p>⏱ ${p.horas}</p>` : "";
          const res     = p.resolucion  ? `<p>📐 ${p.resolucion}</p>` : "";
          const conex   = p.conexiones  ? `<p>🔌 ${p.conexiones}</p>` : "";
          const noDisp  = p.precio === "PRODUCTO NO DISPONIBLE"
                          ? `<p style="color:#e67e22;font-weight:bold;">⚠ No disponible</p>` : "";
          const incid   = p.incidencia  ? `<p class="incidencia">⚠ ${p.incidencia}</p>` : "";

          html += `
            <div class="card">
              <strong>${p.id}</strong>
              ${horas}
              ${res}
              ${conex}
              ${noDisp}
              ${incid}
              <a href="${url}">Ver detalles →</a>
            </div>
          `;
        });

        html += `</div></div>`;
      }

      html += `</div>`;
    }

    contenedor.innerHTML = html;
  });
</script>
</body>
</html>
