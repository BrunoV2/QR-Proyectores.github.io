<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Proyectores</title>
  <style>
    body { font-family: Arial; padding: 20px; }

    .grupo-marca {
      margin-bottom: 30px;
    }
    .grupo-marca h2 {
      margin-bottom: 5px;
      font-size: 2.3em;
      font-weight: 900;
    }
    .grupo-marca hr {
      border: none;
      border-top: 2px solid #aaa;
      margin-bottom: 15px;
    }

    .grupo-modelo {
      margin-left: 15px;
      margin-bottom: 15px;
    }
    .grupo-modelo h3 {
      color: #555;
      margin-bottom: 8px;
      font-size: 1.8em;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .cards-fila {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
    }

    .card {
      border: 1px solid #ccc;
      padding: 18px;
      border-radius: 10px;
    }

    .card strong {
      display: block;
      font-size: 1.1em;
      margin-bottom: 8px;
    }

    .card p {
      margin: 5px 0;
      font-size: 0.95em;
      color: #333;
    }

    .card .incidencia {
      color: #c0392b;
      font-style: italic;
    }

    .card a {
      display: inline-block;
      margin-top: 10px;
      text-decoration: none;
      color: blue;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
<h1>Lista de Proyectores</h1>
<div id="lista"></div>

<script>
fetch("proyectores.json")
  .then(res => res.json())
  .then(data => {
    const contenedor = document.getElementById("lista");

    const porMarca = {};
    data.forEach(p => {
      const marca = p.marca || "Sin marca";
      const modelo = p.modelo || "Sin modelo";
      if (!porMarca[marca]) porMarca[marca] = {};
      if (!porMarca[marca][modelo]) porMarca[marca][modelo] = [];
      porMarca[marca][modelo].push(p);
    });

    let html = "";

    for (const marca in porMarca) {
      html += `<div class="grupo-marca">`;
      html += `<h2>${marca}</h2><hr>`;

      for (const modelo in porMarca[marca]) {
        html += `<div class="grupo-modelo">`;
        html += `<h3>${modelo}</h3>`;
        html += `<div class="cards-fila">`;

        porMarca[marca][modelo].forEach(p => {
          const url = `proyector.html?proyector=${p.id}`;

          const horas   = p.horas      ? `<p>⏱ ${p.horas}</p>` : "";
          const res     = p.resolucion ? `<p>📐 ${p.resolucion}</p>` : "";
          const precio  = p.precio && p.precio !== "PRODUCTO NO DISPONIBLE"
                          ? `<p>💶 ${p.precio}</p>` : "";
          const noDisp  = p.precio === "PRODUCTO NO DISPONIBLE"
                          ? `<p style="color:#e67e22;font-weight:bold;">⚠ No disponible</p>` : "";
          const incid   = p.incidencia ? `<p class="incidencia">⚠ ${p.incidencia}</p>` : "";

          html += `
            <div class="card">
              <strong>${p.id}</strong>
              ${horas}
              ${res}
              ${precio}
              ${noDisp}
              ${incid}
              <a href="${url}">Ver detalles →</a>
            </div>
          `;
        });

        html += `</div></div>`;
      }

      html += `</div>`;
    }

    contenedor.innerHTML = html;
  });
</script>
</body>
</html>
