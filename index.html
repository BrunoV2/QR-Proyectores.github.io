<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Proyectores</title>
 <style>
  /* Base y Fondo */
  body { 
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
    padding: 15px; 
    background-color: #f0f2f5; /* Gris muy claro azulado para que resalten las sombras */
    color: #1a1a1a;
    margin: 0;
  }

  h1 {
    text-align: center;
    font-weight: 800;
    color: #2c3e50;
    text-transform: uppercase;
    letter-spacing: -1px;
    margin-bottom: 30px;
  }

  /* Contenedor de Marca */
  .grupo-marca {
    margin-bottom: 40px;
    background: rgba(255, 255, 255, 0.5);
    padding: 15px;
    border-radius: 20px;
    box-shadow: inset 0 0 10px rgba(255,255,255,0.8);
  }

  .grupo-marca h2 {
    margin-bottom: 5px;
    font-size: 2.1em;
    font-weight: 900;
    color: #1a1a1a;
    text-shadow: 1px 1px 0px #fff;
  }

  .grupo-marca hr {
    border: none;
    border-top: 4px solid #3498db; /* Línea de color marca */
    width: 60px;
    margin: 0 0 20px 0;
    border-radius: 10px;
  }

  /* Contenedor de Modelo */
  .grupo-modelo {
    margin-left: 0; /* Centrado para móvil */
    margin-bottom: 25px;
  }

  .grupo-modelo h3 {
    color: #7f8c8d;
    margin-bottom: 15px;
    font-size: 1.2em;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: flex;
    align-items: center;
  }

  .grupo-modelo h3::before {
    content: "";
    display: inline-block;
    width: 8px;
    height: 8px;
    background: #3498db;
    border-radius: 50%;
    margin-right: 10px;
  }

  /* Grid de Tarjetas */
  .cards-fila {
    display: grid;
    grid-template-columns: repeat(2, 1fr); /* Mantiene tu diseño de 2 columnas */
    gap: 15px;
  }

  /* Tarjeta Individual (La Joya) */
  .card {
    background: #ffffff;
    border: none; /* Quitamos el borde sólido aburrido */
    padding: 20px;
    border-radius: 18px;
    position: relative;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    
    /* Sombra elegante y profunda */
    box-shadow: 0 10px 20px rgba(0,0,0,0.05), 
                0 6px 6px rgba(0,0,0,0.03);
    
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .card:active {
    transform: scale(0.97); /* Efecto de pulsación al tocar en móvil */
  }

  .card strong {
    display: block;
    font-size: 1.3em;
    margin-bottom: 10px;
    color: #2c3e50;
    border-bottom: 1px solid #f0f0f0;
    padding-bottom: 5px;
  }

  .card p {
    margin: 6px 0;
    font-size: 0.9em;
    color: #555;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Colores para estados específicos */
  .card .incidencia {
    color: #e74c3c;
    background: #fdf2f2;
    padding: 8px;
    border-radius: 8px;
    font-style: normal;
    font-weight: 600;
    font-size: 0.85em;
    margin-top: 10px;
    border-left: 3px solid #e74c3c;
  }

  /* Botón Ver Detalles */
  .card a {
    display: block;
    margin-top: 15px;
    text-decoration: none;
    color: #ffffff;
    background: #2c3e50;
    text-align: center;
    padding: 10px;
    border-radius: 12px;
    font-size: 0.85em;
    font-weight: 700;
    transition: background 0.3s ease;
  }

  .card a:hover {
    background: #34495e;
  }

  /* Estilo para "No disponible" */
  .no-disponible-label {
    background: #fff3e0;
    color: #e67e22 !important;
    padding: 5px 10px;
    border-radius: 6px;
    font-weight: bold;
    display: inline-block;
  }
</style>
</head>
<body>
<h1>Lista de Proyectores</h1>
<div id="lista"></div>

<script>
fetch("proyectores.json")
  .then(res => res.json())
  .then(data => {
    const contenedor = document.getElementById("lista");

    const porMarca = {};
    data.forEach(p => {
      const marca = (p.marca || "Sin marca").replace(/^Benq$/i, "BenQ");
      const modelo = p.modelo || "Sin modelo";
      if (!porMarca[marca]) porMarca[marca] = {};
      if (!porMarca[marca][modelo]) porMarca[marca][modelo] = [];
      porMarca[marca][modelo].push(p);
    });

    let html = "";

    for (const marca in porMarca) {
      html += `<div class="grupo-marca">`;
      html += `<h2>${marca}</h2><hr>`;

      for (const modelo in porMarca[marca]) {
        html += `<div class="grupo-modelo">`;
        html += `<h3>${modelo}</h3>`;
        html += `<div class="cards-fila">`;

        porMarca[marca][modelo].forEach(p => {
          const url = `proyector.html?proyector=${p.id}`;

          const horas   = p.horas       ? `<p>⏱ ${p.horas}</p>` : "";
          const res     = p.resolucion  ? `<p>📐 ${p.resolucion}</p>` : "";
          const conex   = p.conexiones  ? `<p>🔌 ${p.conexiones}</p>` : "";
          const noDisp  = p.precio === "PRODUCTO NO DISPONIBLE"
                          ? `<p style="color:#e67e22;font-weight:bold;">⚠ No disponible</p>` : "";
          const incid   = p.incidencia  ? `<p class="incidencia">⚠ ${p.incidencia}</p>` : "";

          html += `
            <div class="card">
              <strong>${p.id}</strong>
              ${horas}
              ${res}
              ${conex}
              ${noDisp}
              ${incid}
              <a href="${url}">Ver detalles →</a>
            </div>
          `;
        });

        html += `</div></div>`;
      }

      html += `</div>`;
    }

    contenedor.innerHTML = html;
  });
</script>
</body>
</html>
