<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Proyectores</title>
<style>
  body { 
    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    min-height: 100vh; font-family: 'Segoe UI', sans-serif; padding: 15px;
  }
  
  .grupo-marca {
    background: rgba(255, 255, 255, 0.3);
    backdrop-filter: blur(10px);
    border-radius: 30px;
    padding: 20px;
    margin-bottom: 30px;
    border: 1px solid rgba(255,255,255,0.3);
  }

  .card {
    background: rgba(255, 255, 255, 0.8);
    border: 1px solid rgba(255,255,255,0.5);
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
  }

  /* Colores pastel en los bordes para identificar el modelo */
  .grupo-modelo h3 { 
    background: #a29bfe; color: white; display: inline-block;
    padding: 5px 15px; border-radius: 20px; font-size: 0.9em;
  }

  .card .incidencia {
    background: #ff7675; color: white; padding: 5px;
    border-radius: 5px; font-size: 0.8em; margin-top: 5px;
  }

  .card a {
    color: #6c5ce7; font-weight: bold; text-decoration: none;
    border: 2px solid #6c5ce7; padding: 5px 10px; border-radius: 10px;
    display: block; text-align: center; margin-top: 10px;
  }
</style>
</head>
<body>
<h1>Lista de Proyectores</h1>
<div id="lista"></div>

<script>
fetch("proyectores.json")
  .then(res => res.json())
  .then(data => {
    const contenedor = document.getElementById("lista");

    const porMarca = {};
    data.forEach(p => {
      const marca = (p.marca || "Sin marca").replace(/^Benq$/i, "BenQ");
      const modelo = p.modelo || "Sin modelo";
      if (!porMarca[marca]) porMarca[marca] = {};
      if (!porMarca[marca][modelo]) porMarca[marca][modelo] = [];
      porMarca[marca][modelo].push(p);
    });

    let html = "";

    for (const marca in porMarca) {
      html += `<div class="grupo-marca">`;
      html += `<h2>${marca}</h2><hr>`;

      for (const modelo in porMarca[marca]) {
        html += `<div class="grupo-modelo">`;
        html += `<h3>${modelo}</h3>`;
        html += `<div class="cards-fila">`;

        porMarca[marca][modelo].forEach(p => {
          const url = `proyector.html?proyector=${p.id}`;

          const horas   = p.horas       ? `<p>⏱ ${p.horas}</p>` : "";
          const res     = p.resolucion  ? `<p>📐 ${p.resolucion}</p>` : "";
          const conex   = p.conexiones  ? `<p>🔌 ${p.conexiones}</p>` : "";
          const noDisp  = p.precio === "PRODUCTO NO DISPONIBLE"
                          ? `<p style="color:#e67e22;font-weight:bold;">⚠ No disponible</p>` : "";
          const incid   = p.incidencia  ? `<p class="incidencia">⚠ ${p.incidencia}</p>` : "";

          html += `
            <div class="card">
              <strong>${p.id}</strong>
              ${horas}
              ${res}
              ${conex}
              ${noDisp}
              ${incid}
              <a href="${url}">Ver detalles →</a>
            </div>
          `;
        });

        html += `</div></div>`;
      }

      html += `</div>`;
    }

    contenedor.innerHTML = html;
  });
</script>
</body>
</html>
