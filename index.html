<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Proyectores</title>
<style>
  body { font-family: 'Arial', sans-serif; background: #e0e5ec; padding: 20px; }
  h1 { color: #444; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); text-align: center; }

  .grupo-marca h2 { font-size: 2.3em; color: #31344b; margin-bottom: 0; }
  .grupo-marca hr { border-top: 3px solid #babecc; opacity: 0.5; }

  .cards-fila { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }

  .card {
    background: #e0e5ec;
    border-radius: 25px;
    padding: 20px;
    /* Doble sombra para efecto relieve */
    box-shadow: 9px 9px 16px rgb(163,177,198,0.6), -9px -9px 16px rgba(255,255,255, 0.5);
    border: none;
  }

  .card strong { color: #444; font-size: 1.1em; border-bottom: 2px solid #3498db; display: inline-block; }
  .card p { color: #555; font-weight: 600; }
  
  .card a {
    margin-top: 15px; display: inline-block;
    color: #3498db; font-weight: 800; text-decoration: none;
    padding: 10px 15px; border-radius: 15px;
    box-shadow: inset 2px 2px 5px #babecc, inset -5px -5px 10px #fff;
  }
</style>
</head>
<body>
<h1>Lista de Proyectores</h1>
<div id="lista"></div>

<script>
fetch("proyectores.json")
  .then(res => res.json())
  .then(data => {
    const contenedor = document.getElementById("lista");

    const porMarca = {};
    data.forEach(p => {
      const marca = (p.marca || "Sin marca").replace(/^Benq$/i, "BenQ");
      const modelo = p.modelo || "Sin modelo";
      if (!porMarca[marca]) porMarca[marca] = {};
      if (!porMarca[marca][modelo]) porMarca[marca][modelo] = [];
      porMarca[marca][modelo].push(p);
    });

    let html = "";

    for (const marca in porMarca) {
      html += `<div class="grupo-marca">`;
      html += `<h2>${marca}</h2><hr>`;

      for (const modelo in porMarca[marca]) {
        html += `<div class="grupo-modelo">`;
        html += `<h3>${modelo}</h3>`;
        html += `<div class="cards-fila">`;

        porMarca[marca][modelo].forEach(p => {
          const url = `proyector.html?proyector=${p.id}`;

          const horas   = p.horas       ? `<p>⏱ ${p.horas}</p>` : "";
          const res     = p.resolucion  ? `<p>📐 ${p.resolucion}</p>` : "";
          const conex   = p.conexiones  ? `<p>🔌 ${p.conexiones}</p>` : "";
          const noDisp  = p.precio === "PRODUCTO NO DISPONIBLE"
                          ? `<p style="color:#e67e22;font-weight:bold;">⚠ No disponible</p>` : "";
          const incid   = p.incidencia  ? `<p class="incidencia">⚠ ${p.incidencia}</p>` : "";

          html += `
            <div class="card">
              <strong>${p.id}</strong>
              ${horas}
              ${res}
              ${conex}
              ${noDisp}
              ${incid}
              <a href="${url}">Ver detalles →</a>
            </div>
          `;
        });

        html += `</div></div>`;
      }

      html += `</div>`;
    }

    contenedor.innerHTML = html;
  });
</script>
</body>
</html>
