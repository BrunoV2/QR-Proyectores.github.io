<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Proyector</title>

 <style>
  body {
    font-family: "Inter", Arial, sans-serif;
    background: #e9e9e9;
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .card {
    width: 100%;
    height: 100vh; /* Pantalla completa */
    background: #ffffff;
    padding: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .card img {
    width: 100%;
    height: 50vh; /* MITAD DE LA PANTALLA */
    object-fit: cover;
  }

  .title {
    font-size: 28px; /* MÁS GRANDE */
    font-weight: 700;
    text-align: center;
    margin: 10px 0;
    color: #222;
  }

  .stats-box {
    height: 40vh; /* MITAD DE LA PANTALLA PARA TEXTO */
    overflow-y: auto;
    padding: 15px;
    background: #f7f7f7;
    border-top: 2px solid #ddd;
  }

  .stat {
    font-size: 20px; /* TEXTO MÁS GRANDE */
    margin: 8px 0;
    color: #333;
  }

  .stat b {
    color: #000;
  }

  .back-btn {
    width: 100%;
    padding: 18px;
    background: #333;
    color: white;
    text-align: center;
    font-size: 20px;
    font-weight: 700;
    text-decoration: none;
    display: block;
  }

  .back-btn:hover {
    background: #555;
  }
</style>
</head>

<body>

<div id="contenido">Cargando...</div>

<script>
// Leer ?proyector=P-01
const params = new URLSearchParams(window.location.search);
const proyectorID = params.get("proyector");

fetch("proyectores.json")
  .then(res => res.json())
  .then(data => {

    const proyector = data.find(p => p.id === proyectorID);

    if (!proyector) {
      document.getElementById("contenido").innerHTML =
        `<div class="not-found">❌ Proyector no encontrado</div>`;
      return;
    }

    // Cargar foto desde /Proyectores-IMG/
    const foto = proyector.foto
      ? `Proyectores-IMG/${proyector.foto}`
      : "Proyectores-IMG/no-image.png";

    document.getElementById("contenido").innerHTML = `
      <div class="card">
        <img src="${foto}" alt="Foto del proyector">

        <div class="title">${proyector.id} – ${proyector.modelo}</div>

        <div class="stats-box">
          <div class="stat"><b>Marca:</b> ${proyector.marca}</div>
          <div class="stat"><b>Nº Serie:</b> ${proyector.numero_serie}</div>
          <div class="stat"><b>Lámpara:</b> ${proyector.tipo_lampara}</div>
          <div class="stat"><b>Precio:</b> ${proyector.precio}</div>
          <div class="stat"><b>Horas:</b> ${proyector.horas}</div>
          <div class="stat"><b>Resolución:</b> ${proyector.resolucion}</div>
          <div class="stat"><b>Conexiones:</b> ${proyector.conexiones}</div>
          <div class="stat"><b>Incidencia:</b> ${proyector.incidencia || "Ninguna"}</div>
          <div class="stat"><b>Ubicación:</b> ${proyector.ubicacion}</div>
        </div>

        <a href="index.html" class="back-btn">⬅ Volver</a>
      </div>
    `;
  });
</script>

</body>
</html>
