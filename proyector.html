<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Detalles Proyector</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Inter", 'Segoe UI', Arial, sans-serif;
      background: #e0e5ec; 
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      padding-top: 10px;
    }

    /* FOTO - Limpia, sin bordes extra, centrada y amplia */
    .img-wrapper {
      width: 90%;
      height: 32vh;
      margin: 0 auto;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .img-wrapper img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      /* Filtro sutil para que los blancos de la imagen no choquen con el gris del fondo */
      filter: drop-shadow(5px 5px 10px rgba(0,0,0,0.05));
    }

    .title {
      font-size: 55px; /* Ajustado para que no sea tan exagerado en móviles */
      font-weight: 900;
      text-align: center;
      margin: 10px 0;
      color: #31344b;
      letter-spacing: -2px;
    }

    /* CAJA DE CARACTERÍSTICAS - Blanca, cerrada y elegante */
    .stats-box {
      flex: 1;
      margin: 10px 25px 110px 25px; /* Margen inferior amplio para el botón */
      padding: 30px;
      background: #ffffff; 
      border-radius: 40px;
      /* Sombra neumórfica clásica hacia afuera */
      box-shadow: 12px 12px 24px #babecc, 
                  -12px -12px 24px #ffffff;
      overflow-y: auto;
      border: 1px solid rgba(255,255,255,0.8);
    }

    .stat {
      font-size: 42px; 
      margin: 20px 0;
      color: #444;
      line-height: 1.2;
      border-bottom: 2px solid #f0f0f0;
      padding-bottom: 12px;
      display: flex;
      flex-direction: column;
    }

    .stat b {
      color: #3498db;
      text-transform: uppercase;
      font-size: 24px;
      margin-bottom: 5px;
      letter-spacing: 1px;
    }

    /* Estilo del scroll para que sea estético */
    .stats-box::-webkit-scrollbar { width: 8px; }
    .stats-box::-webkit-scrollbar-thumb { background: #babecc; border-radius: 10px; }

    /* BOTÓN VOLVER - Neumórfico oscuro */
    .back-btn {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 20px 60px;
      background: #31344b;
      color: #fff;
      font-size: 32px;
      font-weight: 800;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 8px 8px 20px rgba(0,0,0,0.2),
                  inset 2px 2px 5px rgba(255,255,255,0.1);
      z-index: 9999;
      transition: all 0.2s ease;
    }

    .back-btn:active {
      transform: translateX(-50%) scale(0.92);
      box-shadow: inset 4px 4px 10px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

<div id="contenido"></div>

<script>
const params = new URLSearchParams(window.location.search);
const proyectorID = params.get("proyector");

fetch("proyectores.json")
  .then(res => res.json())
  .then(data => {
    const proyector = data.find(p => p.id === proyectorID);
    if (!proyector) {
      document.getElementById("contenido").innerHTML = "<div class='title'>❌ No encontrado</div>";
      return;
    }

    const foto = proyector.foto ? `Proyectores-IMG/${proyector.foto}` : "Proyectores-IMG/no-image.png";

    document.getElementById("contenido").innerHTML = `
      <div class="container">
        <div class="img-wrapper">
          <img src="${foto}" alt="Proyector">
        </div>
        <div class="title">${proyector.id}</div>
        <div class="stats-box">
          <div class="stat"><b>Modelo:</b> ${proyector.modelo}</div>
          <div class="stat"><b>Marca:</b> ${proyector.marca}</div>
          <div class="stat"><b>Nº Serie:</b> ${proyector.numero_serie}</div>
          <div class="stat"><b>Horas:</b> ${proyector.horas || "---"}</div>
          <div class="stat"><b>Precio:</b> ${proyector.precio || "---"}</div>
          <div class="stat"><b>Ubicación:</b> ${proyector.ubicacion || "---"}</div>
          <div class="stat"><b>Incidencia:</b> ${proyector.incidencia || "Ninguna"}</div>
        </div>
        <a href="index.html" class="back-btn">⬅ Volver</a>
      </div>
    `;
  });
</script>
</body>
</html>
