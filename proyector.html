<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Proyector</title>
 <style>
  <style>
  body {
    margin: 0;
    padding: 0;
    font-family: "Inter", Arial, sans-serif;
    background: #e9e9e9;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .card {
    width: 100%;
    height: 100vh;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* FOTO MÁS PEQUEÑA Y AJUSTADA */
  .card img {
    width: 100%;
    height: 30vh; /* FOTO MÁS PEQUEÑA */
    object-fit: contain; /* NO SE SALE */
    background: #00000010;
  }

  /* TÍTULO GRANDE */
  .title {
    font-size: 80px; /* GRANDE DE VERDAD */
    font-weight: 800;
    text-align: center;
    margin: 10px 0;
    color: #111;
  }

  /* CAJA DE TEXTO MÁS GRANDE */
  .stats-box {
    height: 55vh; /* MÁS ESPACIO PARA TEXTO */
    overflow-y: auto;
    padding: 20px;
    background: #f7f7f7;
    border-top: 2px solid #ddd;
  }

  /* TEXTO MUY GRANDE */
  .stat {
    font-size: 50px; /* AHORA SÍ ES GRANDE */
    margin: 12px 0;
    color: #222;
    line-height: 1.5;
  }

  .stat b {
    color: #000;
  }

  /* BOTÓN GRANDE Y CÓMODO */
.back-btn {
    position: fixed;        /* FLOTANTE */
    bottom: 20px;           /* SEPARADO DEL BORDE INFERIOR */
    left: 50%;              /* CENTRADO */
    transform: translateX(-50%);
    padding: 16px 28px;     /* TAMAÑO DEL BOTÓN */
    background: #333;
    color: white;
    font-size: 22px;        /* TEXTO GRANDE */
    font-weight: 800;
    text-decoration: none;
    border-radius: 18px;    /* BORDES REDONDEADOS */
    box-shadow: 0 6px 15px rgba(0,0,0,0.25);
    z-index: 9999;          /* SIEMPRE ENCIMA */
}

.back-btn:hover {
    background: #555;
}

  }
</style>


</head>

<body>

<div id="contenido">Cargando...</div>

<script>
// Leer ?proyector=P-01
const params = new URLSearchParams(window.location.search);
const proyectorID = params.get("proyector");

fetch("proyectores.json")
  .then(res => res.json())
  .then(data => {

    const proyector = data.find(p => p.id === proyectorID);

    if (!proyector) {
      document.getElementById("contenido").innerHTML =
        `<div class="not-found">❌ Proyector no encontrado</div>`;
      return;
    }

    // Cargar foto desde /Proyectores-IMG/
    const foto = proyector.foto
      ? `Proyectores-IMG/${proyector.foto}`
      : "Proyectores-IMG/no-image.png";

    document.getElementById("contenido").innerHTML = `
      <div class="card">
        <img src="${foto}" alt="Foto del proyector">

        <div class="title">${proyector.id} – ${proyector.modelo}</div>

        <div class="stats-box">
          <div class="stat"><b>Marca:</b> ${proyector.marca}</div>
          <div class="stat"><b>Nº Serie:</b> ${proyector.numero_serie}</div>
          <div class="stat"><b>Lámpara:</b> ${proyector.tipo_lampara}</div>
          <div class="stat"><b>Precio:</b> ${proyector.precio}</div>
          <div class="stat"><b>Horas:</b> ${proyector.horas}</div>
          <div class="stat"><b>Resolución:</b> ${proyector.resolucion}</div>
          <div class="stat"><b>Conexiones:</b> ${proyector.conexiones}</div>
          <div class="stat"><b>Incidencia:</b> ${proyector.incidencia || "Ninguna"}</div>
          <div class="stat"><b>Ubicación:</b> ${proyector.ubicacion}</div>
        </div>

        <a href="index.html" class="back-btn">⬅ Volver</a>
      </div>
    `;
  });
</script>

</body>
</html>
