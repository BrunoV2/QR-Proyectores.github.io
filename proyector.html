<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Detalles Proyector</title>
  <style>
  body {
    margin: 0;
    padding: 0;
    font-family: "Inter", Arial, sans-serif;
    background: #e0e5ec; 
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    overflow: hidden; /* Evita que la pantalla se mueva */
  }

  .card {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
  }

  /* FOTO - Ahora ocupa más ancho y sin sombras internas que recorten */
  .card img {
    width: 95%; /* Casi hasta el borde lateral */
    height: 35vh;
    margin: 10px auto; 
    object-fit: contain; /* Asegura que se vea el proyector completo */
    display: block;
    /* Quitamos el fondo oscuro y sombras raras */
  }

  .title {
    font-size: 70px; 
    font-weight: 900;
    text-align: center;
    margin: 5px 0;
    color: #31344b;
  }

  /* CAJA DE CARACTERÍSTICAS - Ahora es un cuadrado perfecto cerrado */
  .stats-box {
    flex: 1; /* Ocupa el espacio sobrante */
    margin: 10px 20px 100px 20px; /* El 100px de abajo hace que NO llegue al final */
    padding: 30px;
    background: #ffffff; 
    border-radius: 40px;
    box-shadow: 10px 10px 20px #babecc, 
                -10px -10px 20px #fff;
    overflow-y: auto;
    border: 1px solid rgba(255,255,255,0.8);
  }

  .stat {
    font-size: 48px; 
    margin: 15px 0;
    color: #333;
    line-height: 1.3;
    border-bottom: 1px solid #eee;
    padding-bottom: 10px;
  }

  .stat b {
    color: #3498db;
    text-transform: uppercase;
  }

  /* BOTÓN VOLVER */
  .back-btn {
    position: fixed;
    bottom: 25px; /* Ajustado para que no pise el cuadro */
    left: 50%;
    transform: translateX(-50%);
    padding: 20px 50px;
    background: #2c3e50;
    color: #fff;
    font-size: 30px;
    font-weight: 900;
    border-radius: 40px;
    text-decoration: none;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    z-index: 9999;
  }

  .back-btn:active {
    transform: translateX(-50%) scale(0.95);
  }
</style>
</head>
<body>

<div id="contenido"></div>

<script>
const params = new URLSearchParams(window.location.search);
const proyectorID = params.get("proyector");

fetch("proyectores.json")
  .then(res => res.json())
  .then(data => {
    const proyector = data.find(p => p.id === proyectorID);
    if (!proyector) {
      document.getElementById("contenido").innerHTML = "❌ No encontrado";
      return;
    }

    const foto = proyector.foto ? `Proyectores-IMG/${proyector.foto}` : "Proyectores-IMG/no-image.png";

    document.getElementById("contenido").innerHTML = `
      <div class="card">
        <img src="${foto}" alt="Proyector">
        <div class="title">${proyector.id}</div>
        <div class="stats-box">
          <div class="stat"><b>Modelo:</b> ${proyector.modelo}</div>
          <div class="stat"><b>Marca:</b> ${proyector.marca}</div>
          <div class="stat"><b>Nº Serie:</b> ${proyector.numero_serie}</div>
          <div class="stat"><b>Horas:</b> ${proyector.horas}</div>
          <div class="stat"><b>Precio:</b> ${proyector.precio}</div>
          <div class="stat"><b>Ubicación:</b> ${proyector.ubicacion}</div>
          <div class="stat"><b>Incidencia:</b> ${proyector.incidencia || "Ninguna"}</div>
          <div style="height: 20px;"></div>
        </div>
        <a href="index.html" class="back-btn">⬅ Volver</a>
      </div>
    `;
  });
</script>
</body>
</html>
