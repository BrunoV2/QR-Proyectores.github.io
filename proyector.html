<style>
  body {
    font-family: "Inter", Arial, sans-serif;
    background: #e9e9e9;
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .card {
    width: 100%;
    height: 100vh;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* FOTO MÁS PEQUEÑA */
  .card img {
    width: 100%;
    height: 35vh; /* 35% de la pantalla */
    object-fit: contain; /* NO se sale del móvil */
    background: #00000010;
  }

  /* TÍTULO GRANDE */
  .title {
    font-size: 30px;
    font-weight: 800;
    text-align: center;
    margin: 10px 0;
    color: #111;
  }

  /* CAJA DE TEXTO MÁS GRANDE */
  .stats-box {
    height: 50vh; /* 50% de la pantalla */
    overflow-y: auto;
    padding: 20px;
    background: #f7f7f7;
    border-top: 2px solid #ddd;
  }

  /* TEXTO GRANDE Y LEGIBLE */
  .stat {
    font-size: 22px;
    margin: 10px 0;
    color: #222;
    line-height: 1.4;
  }

  .stat b {
    color: #000;
  }

  /* BOTÓN GRANDE */
  .back-btn {
    width: 100%;
    padding: 20px;
    background: #333;
    color: white;
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    text-decoration: none;
    display: block;
  }

  .back-btn:hover {
    background: #555;
  }
</style>
