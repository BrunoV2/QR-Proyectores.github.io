<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Proyector</title>

  <style>
    body {
      font-family: "Inter", Arial, sans-serif;
      background: #e9e9e9;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 360px;
      aspect-ratio: 3/4.5;
      background: #ffffff;
      border-radius: 20px;
      border: 4px solid #dcdcdc;
      box-shadow: 0 12px 30px rgba(0,0,0,0.15);
      padding: 18px;
      display: flex;
      flex-direction: column;
      animation: fadeIn 0.4s ease;
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 12px;
      border: 2px solid #ccc;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .title {
      margin-top: 12px;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      color: #222;
      letter-spacing: 0.5px;
    }

    .stats-box {
      margin-top: 12px;
      background: #f7f7f7;
      border-radius: 14px;
      padding: 12px;
      border: 1px solid #e0e0e0;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .stat {
      font-size: 15px;
      margin: 4px 0;
      color: #444;
    }

    .stat b {
      color: #111;
    }

    .back-btn {
      margin-top: 15px;
      padding: 10px;
      background: #333;
      color: white;
      text-align: center;
      border-radius: 10px;
      font-size: 15px;
      text-decoration: none;
      display: block;
      font-weight: 600;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .back-btn:hover {
      background: #555;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .not-found {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      border: 2px solid #ccc;
      text-align: center;
      font-weight: bold;
      color: #333;
      max-width: 300px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<div id="contenido">Cargando...</div>

<script>
// Leer ?proyector=P-01
const params = new URLSearchParams(window.location.search);
const proyectorID = params.get("proyector");

fetch("proyectores.json")
  .then(res => res.json())
  .then(data => {

    const proyector = data.find(p => p.id === proyectorID);

    if (!proyector) {
      document.getElementById("contenido").innerHTML =
        `<div class="not-found">❌ Proyector no encontrado</div>`;
      return;
    }

    // Cargar foto desde /Proyectores-IMG/
    const foto = proyector.foto
      ? `Proyectores-IMG/${proyector.foto}`
      : "Proyectores-IMG/no-image.png";

    document.getElementById("contenido").innerHTML = `
      <div class="card">
        <img src="${foto}" alt="Foto del proyector">

        <div class="title">${proyector.id} – ${proyector.modelo}</div>

        <div class="stats-box">
          <div class="stat"><b>Marca:</b> ${proyector.marca}</div>
          <div class="stat"><b>Nº Serie:</b> ${proyector.numero_serie}</div>
          <div class="stat"><b>Lámpara:</b> ${proyector.tipo_lampara}</div>
          <div class="stat"><b>Precio:</b> ${proyector.precio}</div>
          <div class="stat"><b>Horas:</b> ${proyector.horas}</div>
          <div class="stat"><b>Resolución:</b> ${proyector.resolucion}</div>
          <div class="stat"><b>Conexiones:</b> ${proyector.conexiones}</div>
          <div class="stat"><b>Incidencia:</b> ${proyector.incidencia || "Ninguna"}</div>
          <div class="stat"><b>Ubicación:</b> ${proyector.ubicacion}</div>
        </div>

        <a href="index.html" class="back-btn">⬅ Volver</a>
      </div>
    `;
  });
</script>

</body>
</html>
