<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Proyector</title>
  <style>
  body {
    margin: 0;
    padding: 0;
    font-family: "Inter", Arial, sans-serif;
    background: #e9e9e9; /* Mantenemos tu fondo */
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .card {
    width: 100%;
    height: 100vh;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .card img {
    width: 100%;
    height: 42vh;
    object-fit: contain;
    background: #1a1a1a; /* Solo oscurecemos el fondo de la imagen para que resalte */
  }

  .title {
    font-size: 80px; 
    font-weight: 800;
    text-align: center;
    margin: 10px 0;
    color: #2c3e50; /* Color azul oscuro para combinar con index */
  }

  .stats-box {
    height: 55vh; 
    overflow-y: auto;
    padding: 20px;
    background: #f7f7f7;
    border-top: 4px solid #3498db; /* Línea azul para combinar con index */
  }

  .stat {
    font-size: 50px; 
    margin: 12px 0;
    color: #222;
    line-height: 1.5;
  }

  .stat b {
    color: #3498db; /* Etiquetas en azul para combinar con index */
  }

  .back-btn {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);

    padding: 30px 60px;
    background: #2c3e50; /* Azul oscuro del index */
    color: #fff;

    font-size: 32px;
    font-weight: 900;

    border-radius: 30px;
    text-decoration: none;
    display: block;

    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    z-index: 9999;
  }
</style>
</head>
<body>

<div id="contenido">Cargando...</div>

<script>
const params = new URLSearchParams(window.location.search);
const proyectorID = params.get("proyector");

fetch("proyectores.json")
  .then(res => res.json())
  .then(data => {

    const proyector = data.find(p => p.id === proyectorID);

    if (!proyector) {
      document.getElementById("contenido").innerHTML =
        `<div class="not-found">❌ Proyector no encontrado</div>`;
      return;
    }

    const foto = proyector.foto
      ? `Proyectores-IMG/${proyector.foto}`
      : "Proyectores-IMG/no-image.png";

    document.getElementById("contenido").innerHTML = `
      <div class="card">
        <img src="${foto}" alt="Foto del proyector">

        <div class="title">${proyector.id} – ${proyector.modelo}</div>

        <div class="stats-box">
          <div class="stat"><b>Marca:</b> ${proyector.marca}</div>
          <div class="stat"><b>Nº Serie:</b> ${proyector.numero_serie}</div>
          <div class="stat"><b>Lámpara:</b> ${proyector.tipo_lampara}</div>
          <div class="stat"><b>Precio:</b> ${proyector.precio}</div>
          <div class="stat"><b>Horas:</b> ${proyector.horas}</div>
          <div class="stat"><b>Resolución:</b> ${proyector.resolucion}</div>
          <div class="stat"><b>Conexiones:</b> ${proyector.conexiones}</div>
          <div class="stat"><b>Incidencia:</b> ${proyector.incidencia || "Ninguna"}</div>
          <div class="stat"><b>Ubicación:</b> ${proyector.ubicacion}</div>
          <div style="height: 100px;"></div>
        </div>

        <a href="index.html" class="back-btn">⬅ Volver</a>
      </div>
    `;
  });
</script>
</body>
</html>
