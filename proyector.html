<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Detalles del Proyector</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background: #f0f2f5; /* El mismo fondo que el index */
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: 100%;
      height: 100vh;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      /* Eliminamos bordes para que sea full screen en móvil */
    }

    /* FOTO - Manteniendo el tamaño que pediste */
    .card img {
      width: 100%;
      height: 42vh;
      object-fit: contain;
      background: #1a1a1a; /* Fondo oscuro para que resalte el proyector */
      box-shadow: inset 0 -10px 20px rgba(0,0,0,0.2);
    }

    /* TÍTULO - Manteniendo el tamaño pero mejorando el estilo */
    .title {
      font-size: 80px; 
      font-weight: 900;
      text-align: center;
      padding: 20px 10px;
      color: #2c3e50;
      background: #fff;
      margin: 0;
      letter-spacing: -2px;
      line-height: 1;
    }

    /* CAJA DE TEXTO - Estilo coherente con el index */
    .stats-box {
      height: 55vh;
      overflow-y: auto;
      padding: 30px;
      background: #fdfdfd;
      border-top: 4px solid #3498db; /* Línea azul marca de la casa */
    }

    /* TEXTO GIGANTE - Manteniendo los 50px */
    .stat {
      font-size: 50px; 
      margin: 20px 0;
      color: #333;
      line-height: 1.3;
      border-bottom: 1px solid #f0f0f0;
      padding-bottom: 10px;
    }

    .stat b {
      color: #3498db; /* Los títulos de los datos ahora son azules */
      text-transform: uppercase;
      font-weight: 800;
    }

    /* BOTÓN VOLVER - Negro total como el anterior pero con mejor sombra */
    .back-btn {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      padding: 30px 60px;
      background: #2c3e50; /* Un azul muy oscuro para combinar mejor */
      color: #fff;
      font-size: 32px;
      font-weight: 900;
      border-radius: 50px; /* Más redondeado, estilo cápsula */
      text-decoration: none;
      display: block;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      z-index: 9999;
      transition: transform 0.2s;
    }

    .back-btn:active {
      transform: translateX(-50%) scale(0.95);
    }

    /* Scrollbar discreto */
    .stats-box::-webkit-scrollbar {
      width: 8px;
    }
    .stats-box::-webkit-scrollbar-thumb {
      background: #ccc;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<div id="contenido">Cargando...</div>

<script>
const params = new URLSearchParams(window.location.search);
const proyectorID = params.get("proyector");

fetch("proyectores.json")
  .then(res => res.json())
  .then(data => {
    const proyector = data.find(p => p.id === proyectorID);

    if (!proyector) {
      document.getElementById("contenido").innerHTML =
        `<div style="font-size:40px; text-align:center; padding-top:50px;">❌ No encontrado</div>`;
      return;
    }

    const foto = proyector.foto
      ? `Proyectores-IMG/${proyector.foto}`
      : "Proyectores-IMG/no-image.png";

    document.getElementById("contenido").innerHTML = `
      <div class="card">
        <img src="${foto}" alt="Foto del proyector">

        <div class="title">${proyector.id} – ${proyector.modelo}</div>

        <div class="stats-box">
          <div class="stat"><b>Marca:</b> ${proyector.marca}</div>
          <div class="stat"><b>Nº Serie:</b> ${proyector.numero_serie}</div>
          <div class="stat"><b>Lámpara:</b> ${proyector.tipo_lampara}</div>
          <div class="stat"><b>Precio:</b> ${proyector.precio}</div>
          <div class="stat"><b>Horas:</b> ${proyector.horas}</div>
          <div class="stat"><b>Resolución:</b> ${proyector.resolucion}</div>
          <div class="stat"><b>Conexiones:</b> ${proyector.conexiones}</div>
          <div class="stat"><b>Incidencia:</b> ${proyector.incidencia || "Ninguna"}</div>
          <div class="stat"><b>Ubicación:</b> ${proyector.ubicacion}</div>
          <div style="height: 150px;"></div> <!-- Espacio para que el botón no tape el texto -->
        </div>

        <a href="index.html" class="back-btn">⬅ Volver</a>
      </div>
    `;
  });
</script>

</body>
</html>
